name: Release

on:
  workflow_dispatch:

  push:
    branches:
      - master
    paths:
      - blender_manifest.toml

env:
  ADDON_NAME: "UVgami"
  INCLUDED_FILES: "src LICENSE __init__.py blender_manifest.toml"
  ENGINE_PREFIX: optcuts-engine

jobs:
  check-version:
    uses: ./.github/workflows/check-version.yml
    with:
      file: blender_manifest.toml

  prepare:
    needs: check-version
    if: needs.check-version.outputs.bumped == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Check addon version
        id: version
        shell: bash
        run: |
          VERSION=$(grep '^version' blender_manifest.toml | sed -E 's/version *= *"(.*)"/\1/')
          TAG="v$VERSION"
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q .; then
            echo "::error::Tag $TAG already exists. Bump blender_manifest.toml."
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  optcuts:
    needs: prepare
    uses: ./.github/workflows/engine-build.yml
    secrets: inherit
    permissions:
      contents: write

  partuv:
    needs: prepare
    uses: ./.github/workflows/partuv-build.yml
    secrets: inherit
    permissions:
      contents: write

  package:
    needs: [prepare, optcuts, partuv]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download built engines
        if: needs.optcuts.outputs.built == 'true'
        uses: actions/download-artifact@v4
        with:
          pattern: engine-*
          merge-multiple: true

      - name: Download released engines
        if: needs.optcuts.outputs.built != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ENGINE_VERSION=$(cat engine/optcuts/VERSION | tr -d '[:space:]')
          gh release download "optcuts-v$ENGINE_VERSION" -p "${ENGINE_PREFIX}-*.zip"

      - name: Move to nested folder
        run: |
          mkdir $ADDON_NAME
          mv $INCLUDED_FILES $ADDON_NAME

      - name: Bundle engines and zip
        run: |
          bash .github/scripts/bundle-engines.sh $ADDON_NAME $ENGINE_PREFIX
          zip -r ${ADDON_NAME}.zip $ADDON_NAME

      - name: Determine TAG
        run: echo "TAG=${{ needs.prepare.outputs.tag }}" >> $GITHUB_ENV

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ env.TAG }}
        run: gh release create "$TAG" "${ADDON_NAME}.zip" --title "$TAG"
