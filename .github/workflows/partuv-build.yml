name: PartUV build

on:
  workflow_dispatch:
  push:
    branches:
      - master
    # narrow gate: only a pyproject change can release. the check-version job
    # then confirms the version line actually moved, so dep/config edits and
    # vcpkg changes don't rebuild and clobber the released wheels
    paths:
      - engine/partuv/pyproject.toml

permissions:
  contents: write

env:
  # every arch cuda 13 supports, sm_75 floor through blackwell
  CUDAARCHS: "75-real;80-real;86-real;89-real;90-real;120"
  # source of the bundled windows openmp runtime (see repair windows wheel)
  LLVM_VERSION: "22.1.8"

jobs:
  # paths filters fire on any edit to the file; this gates on the version line
  # actually changing so only a real bump (or a manual run) builds and releases
  check-version:
    runs-on: ubuntu-latest
    outputs:
      bumped: ${{ steps.check.outputs.bumped }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Check for a version bump
        id: check
        shell: bash
        run: |
          if git diff HEAD^ HEAD -- engine/partuv/pyproject.toml | grep -qE '^\+version = '; then
            echo "bumped=true" >> "$GITHUB_OUTPUT"
          else
            echo "bumped=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.bumped == 'true' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-22.04]
        # the addon runs partuv in a managed 3.11 venv, decoupled from blender
        python: ["3.11"]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      # no v8 major alias tag upstream, pin the full version
      - uses: astral-sh/setup-uv@v8.3.2

      - uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: "13.2.0"

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libcgal-dev libyaml-cpp-dev libtbb-dev patchelf

      # ninja needs cl.exe on PATH (the vs generator is not used, see pyproject)
      - name: Set up MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Point vcpkg at a cacheable binary dir
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> $GITHUB_ENV
          echo "VCPKG_DEFAULT_BINARY_CACHE=${{ github.workspace }}/vcpkg-cache" >> $GITHUB_ENV
          mkdir -p vcpkg-cache

      # the runner image's vcpkg clone can lag the pinned builtin-baseline,
      # fetch so the baseline commit is resolvable
      - name: Fetch vcpkg baseline
        if: runner.os == 'Windows'
        shell: bash
        run: git -C "$VCPKG_INSTALLATION_ROOT" fetch origin master

      # first uncached run compiles cgal and friends, about an hour
      - name: Cache vcpkg binaries
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: vcpkg-cache
          key: vcpkg-${{ runner.os }}-${{ hashFiles('engine/partuv/vcpkg.json') }}
          # the version bump that triggers this workflow also changes the hash
          restore-keys: vcpkg-${{ runner.os }}-

      - name: Build wheel
        run: uv build -p ${{ matrix.python }} --wheel engine/partuv -o dist

      # bundle cgal/tbb/yaml-cpp/cudart into the wheel so it imports on a stock
      # linux without the apt dev libs. cudart stays bundled (the geometric tier
      # has no torch to supply it); the large cuda math/dnn libs are excluded,
      # torch provides those for the ai tier
      - name: Repair Linux wheel
        if: runner.os == 'Linux'
        run: |
          uvx auditwheel repair dist/*.whl -w wheelhouse \
            --exclude libcublas.so.12 \
            --exclude libcublasLt.so.12 \
            --exclude libcufft.so.11 \
            --exclude libcusparse.so.12 \
            --exclude libcusolver.so.11 \
            --exclude libcurand.so.10 \
            --exclude libcudnn.so.8
          rm dist/*.whl
          mv wheelhouse/*.whl dist/

      # msvc's /openmp:llvm links against libomp140.x86_64.dll, which visual
      # studio installs but the vc++ redistributable does not ship. bundle
      # upstream llvm's libomp (apache-2.0 with llvm exception, same exports)
      # under the import name; __init__.py already puts .libs on the dll path
      - name: Cache libomp
        if: runner.os == 'Windows'
        id: libomp-cache
        uses: actions/cache@v4
        with:
          path: libomp
          key: libomp-${{ env.LLVM_VERSION }}

      - name: Download LLVM OpenMP runtime
        if: runner.os == 'Windows' && steps.libomp-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          curl -fsSL -o llvm.tar.xz "https://github.com/llvm/llvm-project/releases/download/llvmorg-$LLVM_VERSION/clang+llvm-$LLVM_VERSION-x86_64-pc-windows-msvc.tar.xz"
          mkdir libomp
          tar -xJf llvm.tar.xz -C libomp --strip-components=2 "clang+llvm-$LLVM_VERSION-x86_64-pc-windows-msvc/bin/libomp.dll"
          curl -fsSL -o libomp/libomp140.x86_64.LICENSE.txt "https://raw.githubusercontent.com/llvm/llvm-project/llvmorg-$LLVM_VERSION/openmp/LICENSE.TXT"
          rm llvm.tar.xz

      - name: Repair Windows wheel
        if: runner.os == 'Windows'
        shell: bash
        run: |
          uvx wheel unpack dist/*.whl -d unpacked
          cp libomp/libomp.dll unpacked/partuv-*/partuv/.libs/libomp140.x86_64.dll
          cp libomp/libomp140.x86_64.LICENSE.txt unpacked/partuv-*/partuv/.libs/
          rm dist/*.whl
          uvx wheel pack unpacked/partuv-* -d dist

      # visual studio puts libomp140 in system32 on the runner, which would
      # hide a missing bundled copy from the import test below
      - name: Remove system libomp
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dll = "C:\Windows\System32\libomp140.x86_64.dll"
          if (Test-Path $dll) {
            takeown /f $dll
            icacls $dll /grant "Administrators:F"
            Remove-Item $dll -Force
          }

      # prove the dll/so closure is complete on a machine without the build
      # environment; import loads _core and everything it links
      - name: Test wheel import
        shell: bash
        run: |
          uv venv smoke --python ${{ matrix.python }}
          if [ "$RUNNER_OS" = "Windows" ]; then py=smoke/Scripts/python.exe; else py=smoke/bin/python; fi
          uv pip install --python "$py" dist/*.whl
          "$py" -c "import partuv; print('partuv import ok')"

      - uses: actions/upload-artifact@v4
        with:
          name: partuv-wheel-${{ matrix.os }}-py${{ matrix.python }}
          path: dist/*.whl

  upload:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: previous_tag
        uses: "WyriHaximus/github-action-get-previous-tag@v2"

      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: partuv-wheel-*
          merge-multiple: true
          path: dist

      # the addon install operator finds these by python tag and platform
      - name: Upload wheels to latest release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.previous_tag.outputs.tag }}
        run: gh release upload "$TAG" dist/*.whl --clobber
